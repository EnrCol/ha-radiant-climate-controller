name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("custom_components/radiant_climate_controller/manifest.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          version = data.get("version")
          if not version:
              raise SystemExit("manifest.json does not contain a version")
          print(version)
          PY
          )

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"
          echo "Release tag: v${VERSION}"

      - name: Create release notes file
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## v${{ steps.version.outputs.version }}

          Release created from manifest version ${{ steps.version.outputs.version }}.
          EOF
          cat release-notes.md

      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Nothing created."
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          ARGS=("$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file release-notes.md)

          if [ "$DRAFT" = "true" ]; then
            ARGS+=(--draft)
          fi

          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${ARGS[@]}"
