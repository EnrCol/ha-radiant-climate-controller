name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("custom_components/radiant_climate_controller/manifest.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          version = data.get("version")
          if not version:
              raise SystemExit("manifest.json does not contain a version")
          print(version)
          PY
          )

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"
          echo "Release tag: v${VERSION}"

      - name: Extract changelog section
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          version = "${{ steps.version.outputs.version }}"
          changelog = Path("CHANGELOG.md")
          if not changelog.exists():
              raise SystemExit("CHANGELOG.md not found")

          text = changelog.read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, text, flags=re.M | re.S)
          if not match:
              raise SystemExit(f"No CHANGELOG.md section found for version {version}")

          notes = match.group(0).strip()
          Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
          print(notes)
          PY

      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Nothing created."
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          ARGS=("$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file release-notes.md)

          if [ "$DRAFT" = "true" ]; then
            ARGS+=(--draft)
          fi

          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${ARGS[@]}"
